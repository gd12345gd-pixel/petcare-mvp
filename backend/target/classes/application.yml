server:
  port: 8080
file:
  upload-dir: ${FILE_UPLOAD_DIR:uploads}
  access-url-prefix: ${FILE_ACCESS_URL_PREFIX:http://localhost:8080/uploads}

wechat:
  miniapp:
    appid: ${WECHAT_MINIAPP_APPID:}
    secret: ${WECHAT_MINIAPP_SECRET:}
tencent:
  map:
    key: ${TENCENT_MAP_KEY:}
auth:
  token-secret: ${AUTH_TOKEN_SECRET:dev-only-token-secret}
spring:
  config:
    import: optional:classpath:application-local.yml
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 100MB
  datasource:
    # 账号默认与此前 DataSourceConfig 中一致；可 export DB_USER / DB_PASSWORD 覆盖
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:petcare_mvp}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true&connectTimeout=5000&socketTimeout=60000
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 5
      connection-timeout: 10000
      validation-timeout: 5000
      initialization-fail-timeout: 10000
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: none
      naming:
        physical-strategy: org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy
    open-in-view: false
  jackson:
    time-zone: Asia/Shanghai
logging:
  level:
    org.hibernate.SQL: warn
